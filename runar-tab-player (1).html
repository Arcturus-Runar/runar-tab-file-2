<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Rúnar Tab Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    body {
      font-family: system-ui;
      margin: 30px;
      background: #101114;
      color: #eee;
    }

    textarea {
      width: 100%;
      height: 440px;
      background: #1b1d22;
      color: #eee;
      padding: 14px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #444;
      border-radius: 8px;
    }

    button {
      padding: 10px 16px;
      margin: 10px 6px 20px 0;
      cursor: pointer;
      border: 0;
      border-radius: 6px;
      font-weight: bold;
    }

    .note {
      color: #aaa;
      max-width: 900px;
      line-height: 1.5;
    }

    .hint {
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <h1>Rúnar Tab Player</h1>

  <p class="note">
    Use section labels: RUNAR, SCOTT, CHRIS. Each section gets its own sound.
    Rúnar sings and bends. Scott anchors. Chris moves underneath.
  </p>

<textarea id="tabInput">Tempo = 67

RUNAR
D|------5---0-----------------|------0---3-----------------|------5---0-----------------|------0---3-----------------|
A|------------2---2---1---2---|------------3---2---3h5-----|------------2---2---1---2---|------------3---2---3h5-----|
F|----------0----------------0|--0-------------------------|----------0----------------0|--0-------------------------|
C|----------------------------|--------3----------------5--|----------------------------|--------3----------------4--|
G|----------------------------|---------------------------|----------------------------|---------------------------|
D|----------------------------|---------------------------|----------------------------|------------------------5--|

SCOTT
e|------------------------------------------------------------------------------------------|
B|--------8~~~~~~~~~~~~----------------8~~~~~~~~~~~~----------------7~~~~~~~~~~~~------------|
G|-----9---------------9------------7---------------7------------4---------------4----------|
D|--9----------------------9------9--------------------9------5---------------------5-------|
A|------------------------------------------------------------------------------------------|
E|------------------------------------------------------------------------------------------|

CHRIS
G|------------------------------------------------------------------------------------------|
D|------------------------------------------------------------------------------------------|
A|----------7~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~~~~~~~~~----------|
E|--0~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~-----2~~~~~~~~~~~~~~~~----|</textarea>

  <br>
  <button onclick="playTab()">▶ Play</button>
  <button onclick="stopTab()">■ Stop</button>

  <p class="hint">
    Tip: RUNAR uses D G C F A D tuning. SCOTT uses standard guitar. CHRIS uses standard bass.
  </p>

<script>
const tunings = {
  runar: { "D_HIGH": 62, "A": 57, "F": 53, "C": 48, "G": 43, "D_LOW": 38 },
  scott: { "e": 64, "B": 59, "G": 55, "D": 50, "A": 45, "E": 40 },
  bass:  { "G": 43, "D": 38, "A": 33, "E": 28 }
};

let scheduled = [];

/* -----------------------------
   RÚNAR
   Lead guitar. Singing, expressive, volatile.
   Uses FMSynth for bite and harmonic movement.
------------------------------ */

const runar = new Tone.PolySynth(Tone.FMSynth, {
  maxPolyphony: 6,
  harmonicity: 1.8,
  modulationIndex: 6,
  oscillator: { type: "sine" },
  modulation: { type: "triangle" },
  envelope: {
    attack: 0.03,
    decay: 0.18,
    sustain: 0.65,
    release: 2.6
  },
  modulationEnvelope: {
    attack: 0.02,
    decay: 0.2,
    sustain: 0.4,
    release: 1.8
  }
});

const runarHighPass = new Tone.Filter({ type: "highpass", frequency: 180, rolloff: -24 });
const runarMidBite = new Tone.Filter({ type: "peaking", frequency: 1650, Q: 1.1, gain: 4 });
const runarAir = new Tone.Filter({ type: "highshelf", frequency: 4300, gain: 3.5 });
const runarSoftDrive = new Tone.Distortion({ distortion: 0.16, wet: 0.28 });

const runarChorus = new Tone.Chorus({
  frequency: 0.45,
  delayTime: 3.2,
  depth: 0.35,
  wet: 0.18
}).start();

const runarVibrato = new Tone.Vibrato({
  frequency: 5.2,
  depth: 0.035,
  wet: 0
}).start();

const runarDelay = new Tone.FeedbackDelay({ delayTime: "8n.", feedback: 0.34, wet: 0.26 });
const runarReverb = new Tone.Reverb({ decay: 6.5, wet: 0.32 });
const runarPan = new Tone.Panner(0.28);
const runarVolume = new Tone.Volume(-8);

runar.chain(
  runarHighPass,
  runarMidBite,
  runarAir,
  runarSoftDrive,
  runarChorus,
  runarVibrato,
  runarDelay,
  runarReverb,
  runarPan,
  runarVolume,
  Tone.Destination
);

/* -----------------------------
   SCOTT
   Rhythm guitar. Darker, warmer, underneath.
   Max polyphony reduced to 3 so he stays heavy, not fancy.
------------------------------ */

const scott = new Tone.PolySynth(Tone.Synth, {
  maxPolyphony: 3,
  oscillator: { type: "sawtooth" },
  envelope: {
    attack: 0.015,
    decay: 0.12,
    sustain: 0.42,
    release: 1.4
  }
});

const scottHighPass = new Tone.Filter({ type: "highpass", frequency: 90, rolloff: -24 });
const scottBody = new Tone.Filter({ type: "peaking", frequency: 420, Q: 0.9, gain: 3 });
const scottBite = new Tone.Filter({ type: "peaking", frequency: 1250, Q: 1.2, gain: 2.5 });
const scottLowPass = new Tone.Filter({ type: "lowpass", frequency: 2800, rolloff: -24 });
const scottDrive = new Tone.Distortion({ distortion: 0.28, wet: 0.38 });
const scottDelay = new Tone.FeedbackDelay({ delayTime: "16n", feedback: 0.12, wet: 0.08 });
const scottReverb = new Tone.Reverb({ decay: 3.2, wet: 0.18 });
const scottPan = new Tone.Panner(-0.38);
const scottVolume = new Tone.Volume(-12);

scott.chain(
  scottHighPass,
  scottBody,
  scottBite,
  scottLowPass,
  scottDrive,
  scottDelay,
  scottReverb,
  scottPan,
  scottVolume,
  Tone.Destination
);

/* -----------------------------
   CHRIS
   Bass. Low, round, steady.
   Added finger/pick attack so he has definition, not mud.
------------------------------ */

const chris = new Tone.MonoSynth({
  oscillator: { type: "triangle" },
  envelope: {
    attack: 0.018,
    decay: 0.18,
    sustain: 0.68,
    release: 1.6
  }
});

const chrisHighPass = new Tone.Filter({ type: "highpass", frequency: 45, rolloff: -24 });
const chrisBody = new Tone.Filter({ type: "peaking", frequency: 140, Q: 0.8, gain: 4 });
const chrisFingerNoise = new Tone.Filter({ type: "peaking", frequency: 850, Q: 1.1, gain: 2 });
const chrisAttackEQ = new Tone.Filter({ type: "highshelf", frequency: 1800, gain: 1.2 });
const chrisDrive = new Tone.Distortion({ distortion: 0.08, wet: 0.18 });
const chrisLowPass = new Tone.Filter({ type: "lowpass", frequency: 1100, rolloff: -24 });

const chrisCompressor = new Tone.Compressor({
  threshold: -24,
  ratio: 6,
  attack: 0.012,
  release: 0.18
});

const chrisVolume = new Tone.Volume(-7);

chris.chain(
  chrisHighPass,
  chrisBody,
  chrisFingerNoise,
  chrisAttackEQ,
  chrisDrive,
  chrisLowPass,
  chrisCompressor,
  chrisVolume,
  Tone.Destination
);

/* -----------------------------
   Utility functions
------------------------------ */

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getTempo(text) {
  const match = text.match(/Tempo\s*=\s*(\d+)/i);
  return match ? parseInt(match[1]) : 72;
}

function splitSections(text) {
  const sections = { RUNAR: "", SCOTT: "", CHRIS: "" };
  let current = null;

  text.split("\n").forEach(line => {
    const clean = line.trim().toUpperCase();

    if (clean === "RUNAR" || clean === "SCOTT" || clean === "CHRIS") {
      current = clean;
      return;
    }

    if (current) sections[current] += line + "\n";
  });

  return sections;
}

function getRunarBase(label, stringCounter) {
  if (label === "D") {
    return stringCounter.D === 0 ? tunings.runar.D_HIGH : tunings.runar.D_LOW;
  }
  if (label === "A") return tunings.runar.A;
  if (label === "F") return tunings.runar.F;
  if (label === "C") return tunings.runar.C;
  if (label === "G") return tunings.runar.G;
  return undefined;
}

/* -----------------------------
   Player behaviour
------------------------------ */

function humanVariation(seed, amount) {
  const x = Math.sin(seed * 999) * 10000;
  const random = x - Math.floor(x);
  return 1 + ((random - 0.5) * amount);
}

function getBaseVelocity(playerName, column) {
  if (playerName === "RUNAR") {
    // Wide dynamic range. Rúnar breathes, swells, and suddenly opens.
    const phraseSwell = 0.42 + (Math.sin(column / 7) + 1) * 0.16;
    return phraseSwell * humanVariation(column, 0.28);
  }

  if (playerName === "SCOTT") {
    // Consistent, almost machine-like. Heavy but not expressive in the same way.
    return 0.68 * humanVariation(column, 0.06);
  }

  if (playerName === "CHRIS") {
    // Chris leans into beat-ish positions.
    const accent = column % 16 < 3 ? 0.86 : 0.72;
    return accent * humanVariation(column, 0.12);
  }

  return 0.5;
}

function shapeEventForTechnique(event, playerName) {
  if (event.isSustain) {
    if (playerName === "RUNAR") {
      event.duration += 0.45;
      event.velocity *= 1.08;
      event.vibrato = true;
    }

    if (playerName === "SCOTT") {
      event.duration += 0.35;
      event.velocity *= 0.96;
    }

    if (playerName === "CHRIS") {
      event.duration += 0.7;
      event.velocity *= 1.02;
    }
  }

  if (event.isSlide) {
    if (playerName === "RUNAR") {
      // Rúnar uses slides emotionally: louder, longer, more vocal.
      event.duration *= 1.45;
      event.velocity *= 1.18;
    }

    if (playerName === "SCOTT") {
      // Scott slides like a guitarist shifting weight. Useful, not romantic.
      event.duration *= 1.08;
      event.velocity *= 1.03;
    }

    if (playerName === "CHRIS") {
      event.duration *= 1.18;
      event.velocity *= 1.05;
    }
  }

  if (event.isHammerPull) {
    if (playerName === "RUNAR") {
      event.duration *= 0.78;
      event.velocity *= 0.92;
    }

    if (playerName === "SCOTT") {
      event.duration *= 0.9;
      event.velocity *= 0.97;
    }

    if (playerName === "CHRIS") {
      event.duration *= 0.92;
      event.velocity *= 0.95;
    }
  }

  if (event.isBend) {
    if (playerName === "RUNAR") {
      event.duration += 0.65;
      event.velocity *= 1.24;
      event.vibrato = true;
    }

    if (playerName === "SCOTT") {
      event.duration += 0.2;
      event.velocity *= 1.08;
    }
  }

  event.velocity = Math.max(0.18, Math.min(event.velocity, 1));
  return event;
}

function parseTab(sectionText, playerName) {
  const lines = sectionText.split("\n").filter(l => l.includes("|"));
  const events = [];
  const runarStringCounter = { D: 0 };

  lines.forEach(line => {
    const label = line.slice(0, line.indexOf("|")).trim();
    const content = line.slice(line.indexOf("|") + 1);

    let base;

    if (playerName === "RUNAR") {
      base = getRunarBase(label, runarStringCounter);
      if (label === "D") runarStringCounter.D++;
    } else if (playerName === "SCOTT") {
      base = tunings.scott[label];
    } else if (playerName === "CHRIS") {
      base = tunings.bass[label];
    }

    if (base === undefined) return;

    for (let i = 0; i < content.length; i++) {
      if (/\d/.test(content[i])) {
        let fretText = content[i];

        if (/\d/.test(content[i + 1])) {
          fretText += content[i + 1];
          i++;
        }

        const fret = parseInt(fretText);
        const lookahead = content.slice(i + 1, i + 14);

        let midi = base + fret;
        let duration = playerName === "CHRIS" ? 1.05 : 0.5;
        let velocity = getBaseVelocity(playerName, i);

        const sustainMatch = lookahead.match(/~+/);
        const bendMatch = lookahead.match(/b(\d+)/);

        const event = {
          time: i,
          midi,
          duration,
          velocity,
          isSustain: Boolean(sustainMatch),
          isSlide: lookahead.includes("/") || lookahead.includes("\\"),
          isHammerPull: lookahead.includes("h") || lookahead.includes("p"),
          isBend: Boolean(bendMatch),
          vibrato: false
        };

        if (sustainMatch) {
          event.duration += sustainMatch[0].length * 0.18;
        }

        if (bendMatch) {
          event.midi += parseInt(bendMatch[1]) - fret;
        }

        events.push(shapeEventForTechnique(event, playerName));
      }
    }
  });

  return events.sort((a, b) => a.time - b.time);
}

/* -----------------------------
   Playback
------------------------------ */

async function playTab() {
  await Tone.start();
  stopTab();

  const text = document.getElementById("tabInput").value;
  const tempo = getTempo(text);
  const sections = splitSections(text);

  Tone.Transport.bpm.value = tempo;

  const columnTime = 0.055;

  const tracks = [
    { name: "RUNAR", synth: runar, events: parseTab(sections.RUNAR, "RUNAR") },
    { name: "SCOTT", synth: scott, events: parseTab(sections.SCOTT, "SCOTT") },
    { name: "CHRIS", synth: chris, events: parseTab(sections.CHRIS, "CHRIS") }
  ];

  tracks.forEach(track => {
    track.events.forEach(ev => {
      const id = Tone.Transport.schedule(time => {
        if (track.name === "RUNAR") {
          if (ev.vibrato) {
            runarVibrato.wet.setValueAtTime(0.18, time + 0.08);
            runarVibrato.wet.linearRampToValueAtTime(0, time + ev.duration);
          } else {
            runarVibrato.wet.setValueAtTime(0, time);
          }
        }

        track.synth.triggerAttackRelease(
          midiToFreq(ev.midi),
          ev.duration,
          time,
          ev.velocity
        );
      }, ev.time * columnTime);

      scheduled.push(id);
    });
  });

  Tone.Transport.start();
}

function stopTab() {
  Tone.Transport.stop();
  Tone.Transport.cancel();

  scheduled = [];

  runar.releaseAll();
  scott.releaseAll();
  chris.triggerRelease();

  runarVibrato.wet.value = 0;
}
</script>
</body>
</html>
