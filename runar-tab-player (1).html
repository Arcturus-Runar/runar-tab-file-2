<!doctype html>

<html> <head> <meta charset="utf-8"> <title>Rúnar Tab Player</title> <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script> <style> body { font-family: system-ui; margin: 30px; background: #101114; color: #eee; } textarea { width: 100%; height: 440px; background: #1b1d22; color: #eee; padding: 14px; font-family: monospace; font-size: 14px; border: 1px solid #444; border-radius: 8px; } button { padding: 10px 16px; margin: 10px 6px 20px 0; cursor: pointer; border: 0; border-radius: 6px; font-weight: bold; } .note { color: #aaa; max-width: 900px; line-height: 1.5; } .hint { color: #777; font-size: 0.9rem; } </style> </head>

<body> <h1>Rúnar Tab Player</h1>

<p class="note"> Use section labels: RUNAR, SCOTT, CHRIS. Rúnar uses D G C F A D tuning. Scott uses standard guitar. Chris uses standard bass. </p>

<textarea id="tabInput">Tempo = 67 RUNAR D|------5---0-----------------|------0---3-----------------| A|------------2---2---1---2---|------------3---2---3h5-----| F|----------0----------------0|--0-------------------------| C|----------------------------|--------3----------------5--| G|----------------------------|---------------------------| D|----------------------------|---------------------------| SCOTT e|------------------------------------------------------------------------------------------| B|--------8~~~~~~~~~~~~----------------8~~~~~~~~~~~~----------------7~~~~~~~~~~~~------------| G|-----9---------------9------------7---------------7------------4---------------4----------| D|--9----------------------9------9--------------------9------5---------------------5-------| A|------------------------------------------------------------------------------------------| E|------------------------------------------------------------------------------------------| CHRIS G|------------------------------------------------------------------------------------------| D|------------------------------------------------------------------------------------------| A|----------7~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~~~~~~~~~----------| E|--0~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~-----2~~~~~~~~~~~~~~~~----|</textarea>

<br> <button onclick="playTab()">▶ Play</button> <button onclick="stopTab()">■ Stop</button>

<p class="hint">If it sounds wrong after pushing to GitHub, hard refresh with Ctrl + F5.</p>

<script> const tunings = { runarTopToBottom: [62, 57, 53, 48, 43, 38], // D A F C G D, high to low scott: { "e": 64, "B": 59, "G": 55, "D": 50, "A": 45, "E": 40 }, bass: { "G": 43, "D": 38, "A": 33, "E": 28 } }; let scheduled = []; /* RÚNAR: bright, ringing, high lead */ const runar = new Tone.PolySynth(Tone.Synth, { maxPolyphony: 10, oscillator: { type: "triangle" }, envelope: { attack: 0.22, decay: 0.25, sustain: 0.82, release: 5.8 } }); const runarVibrato = new Tone.Vibrato({ frequency: 4.6, depth: 0.025, wet: 0 }); runar.chain( new Tone.Filter({ type: "highpass", frequency: 650, rolloff: -24 }), new Tone.Filter({ type: "peaking", frequency: 1800, Q: 1.1, gain: 3 }), new Tone.Filter({ type: "highshelf", frequency: 4200, gain: 4 }), new Tone.Distortion({ distortion: 0.04, wet: 0.10 }), new Tone.Chorus({ frequency: 0.8, delayTime: 4.8, depth: 0.75, wet: 0.42 }).start(), runarVibrato, new Tone.FeedbackDelay({ delayTime: "8n.", feedback: 0.46, wet: 0.48 }), new Tone.Reverb({ decay: 12, wet: 0.62 }), new Tone.Panner(0.34), new Tone.Volume(-5), Tone.Destination ); /* SCOTT: darker second guitar */ const scott = new Tone.PolySynth(Tone.Synth, { maxPolyphony: 3, oscillator: { type: "sawtooth" }, envelope: { attack: 0.02, decay: 0.12, sustain: 0.42, release: 1.4 } }); scott.chain( new Tone.Filter({ type: "highpass", frequency: 90, rolloff: -24 }), new Tone.Filter({ type: "peaking", frequency: 420, Q: 0.9, gain: 3 }), new Tone.Filter({ type: "lowpass", frequency: 2400, rolloff: -24 }), new Tone.Distortion({ distortion: 0.22, wet: 0.32 }), new Tone.Reverb({ decay: 3.2, wet: 0.18 }), new Tone.Panner(-0.38), new Tone.Volume(-12), Tone.Destination ); /* CHRIS: bass */ const chris = new Tone.MonoSynth({ oscillator: { type: "triangle" }, envelope: { attack: 0.018, decay: 0.18, sustain: 0.68, release: 1.6 } }); chris.chain( new Tone.Filter({ type: "highpass", frequency: 45, rolloff: -24 }), new Tone.Filter({ type: "peaking", frequency: 140, Q: 0.8, gain: 4 }), new Tone.Filter({ type: "peaking", frequency: 850, Q: 1.1, gain: 2 }), new Tone.Distortion({ distortion: 0.08, wet: 0.18 }), new Tone.Filter({ type: "lowpass", frequency: 1100, rolloff: -24 }), new Tone.Compressor({ threshold: -24, ratio: 6, attack: 0.012, release: 0.18 }), new Tone.Volume(-7), Tone.Destination ); function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); } function getTempo(text) { const match = text.match(/Tempo\s*=\s*(\d+)/i); return match ? parseInt(match[1]) : 72; } function splitSections(text) { const sections = { RUNAR: "", SCOTT: "", CHRIS: "" }; let current = null; text.split("\n").forEach(line => { const clean = line.trim().toUpperCase(); if (clean === "RUNAR" || clean === "SCOTT" || clean === "CHRIS") { current = clean; return; } if (current) sections[current] += line + "\n"; }); return sections; } function getBaseMidi(label, playerName, stringIndex) { if (playerName === "RUNAR") return tunings.runarTopToBottom[stringIndex]; if (playerName === "SCOTT") return tunings.scott[label]; if (playerName === "CHRIS") return tunings.bass[label]; return undefined; } function parseTab(sectionText, playerName) { const lines = sectionText.split("\n").filter(l => l.includes("|")); const events = []; lines.forEach((line, stringIndex) => { const pipe = line.indexOf("|"); const label = line.slice(0, pipe).trim(); const content = line.slice(pipe + 1); const base = getBaseMidi(label, playerName, stringIndex); if (base === undefined) return; for (let i = 0; i < content.length; i++) { if (!/\d/.test(content[i])) continue; if (content[i - 1] === "b") continue; let fretText = content[i]; if (/\d/.test(content[i + 1])) { fretText += content[i + 1]; i++; } const fret = parseInt(fretText); const lookahead = content.slice(i + 1, i + 14); let midi = base + fret; let duration = playerName === "CHRIS" ? 1.05 : 0.5; let velocity = playerName === "RUNAR" ? 0.52 : playerName === "SCOTT" ? 0.62 : 0.78; let vibrato = false; const sustain = lookahead.match(/~+/); if (sustain) { duration += sustain[0].length * 0.2; if (playerName === "RUNAR") vibrato = true; } const bend = lookahead.match(/b(\d+)/); if (bend) { midi += parseInt(bend[1]) - fret; duration += 0.55; velocity += 0.12; vibrato = playerName === "RUNAR"; } if (lookahead.includes("h") || lookahead.includes("p")) { duration *= 0.8; velocity *= 0.9; } if (lookahead.includes("/") || lookahead.includes("\\")) { duration *= 1.25; } events.push({ time: i, midi, duration, velocity: Math.min(velocity, 1), vibrato }); } }); return events.sort((a, b) => a.time - b.time); } async function playTab() { await Tone.start(); stopTab(); const text = document.getElementById("tabInput").value; const tempo = getTempo(text); const sections = splitSections(text); Tone.Transport.bpm.value = tempo; const columnTime = 0.055; const tracks = [ { name: "RUNAR", synth: runar, events: parseTab(sections.RUNAR, "RUNAR") }, { name: "SCOTT", synth: scott, events: parseTab(sections.SCOTT, "SCOTT") }, { name: "CHRIS", synth: chris, events: parseTab(sections.CHRIS, "CHRIS") } ]; tracks.forEach(track => { track.events.forEach(ev => { const id = Tone.Transport.schedule(time => { if (track.name === "RUNAR") { runarVibrato.wet.setValueAtTime(ev.vibrato ? 0.16 : 0, time); if (ev.vibrato) runarVibrato.wet.linearRampToValueAtTime(0, time + ev.duration); } track.synth.triggerAttackRelease( midiToFreq(ev.midi), ev.duration, time, ev.velocity ); }, ev.time * columnTime); scheduled.push(id); }); }); Tone.Transport.start(); } function stopTab() { Tone.Transport.stop(); Tone.Transport.cancel(); scheduled = []; runar.releaseAll(); scott.releaseAll(); chris.triggerRelease(); runarVibrato.wet.value = 0; } </script>

</body> </html>
