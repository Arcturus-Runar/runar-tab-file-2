<body>
  <h1>Rúnar Tab Player</h1>

  <p class="note">
    Use section labels: RUNAR, SCOTT, CHRIS. Each section gets its own sound.
    Rúnar is bright, high-passed and wide. Scott is warmer and darker. Chris is bass.
  </p>

<textarea id="tabInput">Tempo = 67

RUNAR
D|------5---0-----------------|------0---3-----------------|------5---0-----------------|------0---3-----------------|
A|------------2---2---1---2---|------------3---2---3h5-----|------------2---2---1---2---|------------3---2---3h5-----|
F|----------0----------------0|--0-------------------------|----------0----------------0|--0-------------------------|
C|----------------------------|--------3----------------5--|----------------------------|--------3----------------4--|
G|----------------------------|---------------------------|----------------------------|---------------------------|
D|----------------------------|---------------------------|----------------------------|------------------------5--|

SCOTT
e|------------------------------------------------------------------------------------------|
B|--------8~~~~~~~~~~~~----------------8~~~~~~~~~~~~----------------7~~~~~~~~~~~~------------|
G|-----9---------------9------------7---------------7------------4---------------4----------|
D|--9----------------------9------9--------------------9------5---------------------5-------|

CHRIS
G|------------------------------------------------------------------------------------------|
D|------------------------------------------------------------------------------------------|
A|----------7~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~~~~~~~~~----------|
E|--0~~~~~~~~~~~~~~~~~~~~~~~~~~~~----------------3~~~~~~~~~~~~~~~~-----2~~~~~~~~~~~~~~~~----|</textarea>

  <br>
  <button onclick="playTab()">▶ Play</button>
  <button onclick="stopTab()">■ Stop</button>

  <p class="hint">
    Tip: RUNAR currently uses D G C F A D tuning. SCOTT uses standard guitar. CHRIS uses standard bass.
  </p>

<script>
/*
  RÚNAR TAB PLAYER

  RUNAR tuning:
  D G C F A D, low to high.
  Written top to bottom:
  D A F C G D

  SCOTT tuning:
  Standard guitar, E A D G B e.

  CHRIS tuning:
  Standard bass, E A D G.
*/

const tunings = {
  runar: { "D_HIGH": 62, "A": 57, "F": 53, "C": 48, "G": 43, "D_LOW": 38 },
  scott: { "e": 64, "B": 59, "G": 55, "D": 50, "A": 45, "E": 40 },
  bass:  { "G": 43, "D": 38, "A": 33, "E": 28 }
};

let scheduled = [];

/* -----------------------------
   RÚNAR
   Bright, high, airy, almost bell-like.
   Less body. More glass. More distance.
------------------------------ */

const runar = new Tone.PolySynth(Tone.Synth, {
  maxPolyphony: 6,
  oscillator: { type: "sawtooth" },
  envelope: {
    attack: 0.035,
    decay: 0.18,
    sustain: 0.62,
    release: 2.8
  }
});

const runarHighPass = new Tone.Filter({
  type: "highpass",
  frequency: 180,
  rolloff: -24
});

const runarAir = new Tone.Filter({
  type: "highshelf",
  frequency: 4300,
  gain: 3.5
});

const runarMidBite = new Tone.Filter({
  type: "peaking",
  frequency: 1650,
  Q: 1.1,
  gain: 4
});

const runarSoftDrive = new Tone.Distortion({
  distortion: 0.16,
  wet: 0.28
});

const runarChorus = new Tone.Chorus({
  frequency: 0.45,
  delayTime: 3.2,
  depth: 0.35,
  wet: 0.18
}).start();

const runarDelay = new Tone.FeedbackDelay({
  delayTime: "8n.",
  feedback: 0.34,
  wet: 0.26
});

const runarReverb = new Tone.Reverb({
  decay: 6.5,
  wet: 0.32
});

const runarPan = new Tone.Panner(0.28);
const runarVolume = new Tone.Volume(-8);

runar.chain(
  runarHighPass,
  runarMidBite,
  runarAir,
  runarSoftDrive,
  runarChorus,
  runarDelay,
  runarReverb,
  runarPan,
  runarVolume,
  Tone.Destination
);

/* -----------------------------
   Utility functions
------------------------------ */

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getTempo(text) {
  const match = text.match(/Tempo\s*=\s*(\d+)/i);
  return match ? parseInt(match[1]) : 72;
}

function splitSections(text) {
  const sections = { RUNAR: "", SCOTT: "", CHRIS: "" };
  let current = null;

  text.split("\n").forEach(line => {
    const clean = line.trim().toUpperCase();

    if (clean === "RUNAR" || clean === "SCOTT" || clean === "CHRIS") {
      current = clean;
      return;
    }

    if (current) {
      sections[current] += line + "\n";
    }
  });

  return sections;
}

function getRunarBase(label, stringCounter) {
  /*
    Rúnar has two D strings in D G C F A D.
    In tab they appear as:
    D high
    A
    F
    C
    G
    D low
  */

  if (label === "D") {
    return stringCounter.D === 0 ? tunings.runar.D_HIGH : tunings.runar.D_LOW;
  }

  if (label === "A") return tunings.runar.A;
  if (label === "F") return tunings.runar.F;
  if (label === "C") return tunings.runar.C;
  if (label === "G") return tunings.runar.G;

  return undefined;
}

function parseTab(sectionText, playerName) {
  const lines = sectionText.split("\n").filter(l => l.includes("|"));
  const events = [];
  const runarStringCounter = { D: 0 };

  lines.forEach(line => {
    const label = line.slice(0, line.indexOf("|")).trim();
    const content = line.slice(line.indexOf("|") + 1);

    let base;

    if (playerName === "RUNAR") {
      base = getRunarBase(label, runarStringCounter);
      if (label === "D") runarStringCounter.D++;
    } else if (playerName === "SCOTT") {
      base = tunings.scott[label];
    } else if (playerName === "CHRIS") {
      base = tunings.bass[label];
    }

    if (base === undefined) return;

    for (let i = 0; i < content.length; i++) {
      if (/\d/.test(content[i])) {
        let fretText = content[i];

        if (/\d/.test(content[i + 1])) {
          fretText += content[i + 1];
          i++;
        }

        const fret = parseInt(fretText);
        const lookahead = content.slice(i + 1, i + 12);

        let midi = base + fret;
        let duration = playerName === "CHRIS" ? 1.1 : 0.58;
        let velocity = playerName === "CHRIS" ? 0.78 : 0.5;

        if (playerName === "RUNAR") {
          duration = 0.42;
          velocity = 0.42;
        }

        const sustain = lookahead.match(/~+/);
        if (sustain) {
          duration += sustain[0].length * (playerName === "RUNAR" ? 0.35 : 0.45);
        }

        const bend = lookahead.match(/b(\d+)/);
        if (bend) {
          midi += parseInt(bend[1]) - fret;
          duration += 0.5;
          velocity += 0.12;
        }

        if (lookahead.includes("h") || lookahead.includes("p")) {
          duration *= 0.75;
          velocity *= 0.9;
        }

        if (lookahead.includes("/") || lookahead.includes("\\")) {
          duration *= 1.25;
        }

        events.push({
          time: i,
          midi,
          duration,
          velocity: Math.min(velocity, 1)
        });
      }
    }
  });

  return events.sort((a, b) => a.time - b.time);
}

async function playTab() {
  await Tone.start();
  stopTab();

  const text = document.getElementById("tabInput").value;
  const tempo = getTempo(text);
  const sections = splitSections(text);

  Tone.Transport.bpm.value = tempo;

  const columnTime = 0.055;

  const tracks = [
    { name: "RUNAR", synth: runar, events: parseTab(sections.RUNAR, "RUNAR") },
    { name: "SCOTT", synth: scott, events: parseTab(sections.SCOTT, "SCOTT") },
    { name: "CHRIS", synth: chris, events: parseTab(sections.CHRIS, "CHRIS") }
  ];

  tracks.forEach(track => {
    track.events.forEach(ev => {
      const id = Tone.Transport.schedule(time => {
        track.synth.triggerAttackRelease(
          midiToFreq(ev.midi),
          ev.duration,
          time,
          ev.velocity
        );
      }, ev.time * columnTime);

      scheduled.push(id);
    });
  });

  Tone.Transport.start();
}

function stopTab() {
  Tone.Transport.stop();
  Tone.Transport.cancel();

  scheduled = [];

  runar.releaseAll();
  scott.releaseAll();
  chris.triggerRelease();
}
</script>
